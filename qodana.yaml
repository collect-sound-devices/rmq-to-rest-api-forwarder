#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

#################################################################################
#              WARNING: Do not store sensitive information in this file,        #
#               as its contents will be included in the Qodana report.          #
#################################################################################
version: "1.0"

# Analyze the .NET solution in this repository.
dotnet:
  solution: RmqToRestApiForwarder.sln

# Keep the default .NET checks and make code metrics explicit.
profile:
  base:
    name: qodana.recommended
  inspections:
    - inspection: CyclomaticComplexityInspection
      enabled: true
      options:
        Threshold: 4
    - inspection: CA1502
      enabled: true
    - inspection: CA1505
      enabled: true

#Disable inspections
exclude:
  - name: All
    paths:
      - ./.next
      - qodana.yaml
      - README.md
      - deploy-via-docker\docker-compose.yml
      - .editorconfig
      - .github\workflows
      - deploy-via-docker
      - artifacts
      - msbuildLib
      - Projects\RmqToRestApiForwarder\appsettings.Docker.json
      - Projects\RmqToRestApiForwarder\appsettings.json
#      - Projects\RmqToRestApiForwarder\ConfigurationRecords.cs
      - docker-compose.yml
      - PODMAN-vs-DOCKER.md
      - RmqToRestApiForwarder-Release-Notes.md

#Execute shell command before Qodana execution (Applied in CI/CD pipeline)
#bootstrap: sh ./prepare-qodana.sh

#Install IDE plugins before Qodana execution (Applied in CI/CD pipeline)
#plugins:
#  - id: <plugin.id> #(plugin id can be found at https://plugins.jetbrains.com)

# Quality gate. Will fail the CI/CD pipeline if any condition is not met
# severityThresholds - configures maximum thresholds for different problem severities
# testCoverageThresholds - configures minimum code coverage on a whole project and newly added code
#  coverage is available in Ultimate and Ultimate Plus plans
#failureConditions:
#  severityThresholds:
#    any: 15
#    critical: 5
#  testCoverageThresholds:
#    fresh: 70
#    total: 50

# Run Qodana for .NET in native mode so Roslyn-based metrics are analyzed
# in the same environment as the project build.
linter: qodana-dotnet
withinDocker: false
